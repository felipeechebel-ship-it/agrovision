<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#065f46"/>
    </linearGradient>
  </defs>
  <!-- Fondo redondeado -->
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Sombra/profundidad central -->
  <circle cx="256" cy="256" r="190" fill="#052e16" opacity="0.18"/>
  <!-- Hoja izquierda (más clara) -->
  <path d="M256 420 C160 420 90 320 110 190 C130 110 210 80 256 80 C256 80 190 220 256 420Z"
        fill="#bbf7d0" opacity="0.75"/>
  <!-- Hoja derecha (verde vivo) -->
  <path d="M256 420 C352 420 422 320 402 190 C382 110 302 80 256 80 C256 80 322 220 256 420Z"
        fill="#4ade80"/>
  <!-- Nervio central -->
  <path d="M256 420 L256 130" stroke="#15803d" stroke-width="14" stroke-linecap="round"/>
  <!-- Nerviaciones izquierda -->
  <path d="M256 290 L185 245" stroke="#15803d" stroke-width="9" stroke-linecap="round" opacity="0.8"/>
  <path d="M256 240 L185 200" stroke="#15803d" stroke-width="9" stroke-linecap="round" opacity="0.8"/>
  <path d="M256 340 L190 305" stroke="#15803d" stroke-width="9" stroke-linecap="round" opacity="0.8"/>
  <!-- Brillo superior izquierdo -->
  <ellipse cx="218" cy="190" rx="42" ry="65" fill="white" opacity="0.10" transform="rotate(-20 218 190)"/>
</svg>
